services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: manager-app
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - manager

  web:
    image: nginx:1.27-alpine
    container_name: manager-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - manager

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: manager-queue
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    command: sh -lc "php artisan queue:work --sleep=1 --tries=3 --timeout=90"
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - manager

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: manager-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    command: sh -lc "php artisan schedule:work"
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - manager

  websocket:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: manager-websocket
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    command: >
      sh -lc "
      if php artisan list --raw | grep -q '^reverb:start'; then
        php artisan reverb:start --host=0.0.0.0 --port=8080;
      elif php artisan list --raw | grep -q '^websockets:serve'; then
        php artisan websockets:serve --host=0.0.0.0 --port=8080;
      else
        echo 'No websocket command found. Install laravel/reverb or beyondcode/laravel-websockets.';
        sleep infinity;
      fi"
    ports:
      - "8080:8080"
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - manager

  mysql:
    image: mysql:8.4
    container_name: manager-mysql
    restart: unless-stopped
    ports:
      - "33060:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-manager}
      MYSQL_USER: ${DB_USERNAME:-manager}
      MYSQL_PASSWORD: ${DB_PASSWORD:-manager}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASSWORD:-root}"]
      timeout: 5s
      retries: 20
      interval: 5s
      start_period: 10s
    networks:
      - manager

  redis:
    image: redis:7-alpine
    container_name: manager-redis
    restart: unless-stopped
    ports:
      - "63790:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 20
      interval: 5s
      start_period: 5s
    networks:
      - manager

  vite:
    image: node:22-alpine
    container_name: manager-vite
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -lc "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
    networks:
      - manager

volumes:
  mysql_data:

networks:
  manager:
    driver: bridge
